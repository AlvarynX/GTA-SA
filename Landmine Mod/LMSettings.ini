; ==================================================
; Landmine Mod - Configuration
; ==================================================
; Autor: AlvarynGTA
; Version: 1.0
;
; This configuration file can be reloaded in-game
; by pressing SHIFT + F7.
;
; NOTE:
; The key combination will only work while the player
; is holding the current weapon defined in WeaponID.
;
; Changes are applied immediately after reload.
; However, settings that affect landmine behavior
; (activation delay, lifetime, etc.) will only apply
; to newly planted landmines.
;
; Landmines already placed in the world will keep
; the parameters they were created with.
; ==================================================

[Settings]
; Weapon ID that will deploy the landmine when fired
; Default: 39 (for test)
WeaponID = 39	#(int)

; Object model used as the landmine
; Default: 1213 (#MINE)
; NOTE: This does not need to match the weapon's model. You can use a different object with neutral orientation.
ModelID = 1213	#(int)

; Delay in SECONDS before the landmine is activated
; Default: 2
; Range: 0–30
TimeReady = 3	#(int)

; Lifetime in MINUTES before the landmine expires automatically
; Default: 10
; Range: 1–60
TimeLimit = 10	#(int)

; Maximum number of active landmine
; Default: 10
; Range: 1–32
CountLimit = 10	#(int)

; Enable invisibility / hiding of landmine after activation delay
; 0 = OFF (default)
; 1 = ON  
Hidden = 0	#(int)

; Enable debug messages
; 0 = OFF (default)
; 1 = ON
Debug = 0	#(int)